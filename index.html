<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Bookmark provides shortcut website links for HRMS, RESS, IRCTC, and other important railway portals.">
  <title>My Book Mark</title>

  <link rel="preload" as="image" href="image.webp">

  <link rel="preconnect" href="https://www.googletagmanager.com">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SEVW0N33XQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SEVW0N33XQ');
  </script>

  
</head>

<body>
  <img src="image.webp" class="background-image" alt="" aria-hidden="true" fetchpriority="high">

  <main>
    <h1>MY BOOK MARK</h1>
    
    <table>
      <thead>
        <tr>
          <th scope="col">Name</th>
          <th scope="col">Website Direct Login Page</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>HRMS</td>
          <td><a target="_blank" rel="noopener noreferrer" href="https://hrms.indianrail.gov.in/HRMS/">Login to HRMS</a></td>
        </tr>
        <tr>
          <td>RESS</td>
          <td><a target="_blank" rel="noopener noreferrer" href="https://aims.indianrailways.gov.in/ress">Login to RESS</a></td>
        </tr>
        <tr>
          <td>IRCTC</td>
          <td><a target="_blank" rel="noopener noreferrer" href="https://www.irctc.co.in/nget/train-search">Login to IRCTC</a></td>
        </tr>
        <tr>
          <td>TTE LOBBY</td>
          <td><a target="_blank" rel="noopener noreferrer" href="https://ttelobby.indianrail.gov.in/cttel/new_home.jsp">Login to TTE Lobby</a></td>
        </tr>
        <tr>
          <td>UMID CARD</td>
          <td><a target="_blank" rel="noopener noreferrer" href="https://www.irtsa.net/UMID-Conversation-between-Sr-DPO-N-Rly-Delhi-and-Editor-Bharat-Pensioner-on-14-07-2019.html">Login to UMID Card</a></td>
        </tr>
        <tr>
          <td>HIMS</td>
          <td><a target="_blank" rel="noopener noreferrer" href="https://www.hmis.mohfw.gov.in/#!/login">Login to HIMS</a></td>
        </tr>
      </tbody>
    </table>
  </main>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: honeydew;
      font-family: Georgia, 'Times New Roman', Times, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 10px;
    }

    /* Accessibility Fix: Main टैग का स्टाइल */
    main {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #000;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    table {
      background-color: rgb(255, 255, 255);
      border-collapse: collapse; 
      border: 3px solid black;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
    }

    th, td { border: 1px solid black; padding: 12px; text-align: left; }
    th { background-color: #f2f2f2; }
    
    a { text-decoration: none; color: blue; font-weight: bold; }
    a:hover { text-decoration: underline; }
  
    .background-image {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      object-fit: cover; z-index: -1; opacity: 0.8; pointer-events: none;
    }
  </style>

</body>
</html>
